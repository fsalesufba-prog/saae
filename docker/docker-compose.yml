version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: saae_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    networks:
      - saae_network

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    container_name: saae_backend
    restart: always
    environment:
      NODE_ENV: production
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
    ports:
      - "3001:3001"
    volumes:
      - ../uploads:/app/uploads
      - ../logs:/app/logs
    depends_on:
      - mysql
    networks:
      - saae_network

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.client
    container_name: saae_frontend
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ../ssl:/etc/nginx/ssl
    depends_on:
      - backend
    networks:
      - saae_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: saae_phpmyadmin
    restart: always
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      UPLOAD_LIMIT: 100M
    ports:
      - "8080:80"
    depends_on:
      - mysql
    networks:
      - saae_network

networks:
  saae_network:
    driver: bridge

volumes:
  mysql_data: